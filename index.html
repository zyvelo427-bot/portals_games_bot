<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Arena Live</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Firebase (НЕ module версия) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<!-- Telegram -->
<script src="https://tg.dev/js/telegram-web-app.js"></script>

<style>
body {
    background: #000;
    color: #fff;
    margin: 0;
    font-family: sans-serif;
}
.btn {
    background: #1c1c1e;
    padding: 15px;
    border-radius: 15px;
    border: 1px solid #333;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

// 🔥 ВСТАВЬ СВОЙ НОРМАЛЬНЫЙ CONFIG СЮДА
const firebaseConfig = {
    apiKey: "PASTE_YOUR_KEY",
    authDomain: "portals-c5000.firebaseapp.com",
    databaseURL: "https://portals-c5000-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "portals-c5000",
    storageBucket: "portals-c5000.appspot.com",
    messagingSenderId: "24003070752",
    appId: "PASTE_YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function App() {
    const [bank, setBank] = React.useState(0);
    const [lastUser, setLastUser] = React.useState("...");
    const [balance, setBalance] = React.useState(100);
    const [username, setUsername] = React.useState("Player");

    React.useEffect(() => {
        // Telegram
        if (window.Telegram?.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            const user = tg.initDataUnsafe?.user;
            if (user) setUsername(user.username || user.first_name);
        }

        // Firebase auth
        firebase.auth().signInAnonymously();

        const ref = db.ref("live_arena_v1");

        ref.on("value", (snap) => {
            const data = snap.val();
            if (data) {
                setBank(data.bank || 0);
                setLastUser(data.lastUser || "...");
            }
        });
    }, []);

    const bet = (amount) => {
        if (balance < amount) return;

        setBalance(prev => prev - amount);

        const ref = db.ref("live_arena_v1");

        ref.update({
            bank: firebase.database.ServerValue.increment(amount),
            lastUser: username
        });
    };

    return (
        <div style={{padding:20}}>
            <h1>🔥 Arena Live</h1>

            <p>Баланс: {balance} TON</p>

            <h2>Банк: {bank}</h2>
            <p>Последний: @{lastUser}</p>

            <div style={{display:"flex", gap:10}}>
                {[1,5,10,25].map(v => (
                    <button key={v} className="btn" onClick={()=>bet(v)}>
                        {v} TON
                    </button>
                ))}
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
