<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Arena Live</title>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase FIXED (compat версия) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<!-- Telegram -->
<script src="https://tg.dev/js/telegram-web-app.js"></script>

<style>
body { 
    background-color: #000; 
    color: #fff; 
    margin: 0; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    overflow: hidden; 
}
.card-grad { 
    background: linear-gradient(145deg, #1a1a1c, #0a0a0b); 
    border: 1px solid rgba(255,255,255,0.08); 
}
.btn-bet { 
    background: #1c1c1e; 
    border: 1px solid rgba(255,255,255,0.05); 
    transition: all 0.1s ease;
}
.btn-bet:active { 
    transform: scale(0.92); 
    background: #2563eb; 
}
.online-dot { 
    width: 6px; 
    height: 6px; 
    background: #22c55e; 
    border-radius: 9999px; 
    animation: pulse 2s infinite; 
}
@keyframes pulse { 
    0%, 100% { opacity: 1; transform: scale(1); } 
    50% { opacity: 0.3; transform: scale(1.3); } 
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

// 🔥 ВСТАВЬ СВОИ НАСТОЯЩИЕ КЛЮЧИ
const firebaseConfig = {
    apiKey: "PASTE_KEY",
    authDomain: "portals-c5000.firebaseapp.com",
    databaseURL: "https://portals-c5000-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "portals-c5000",
    storageBucket: "portals-c5000.appspot.com",
    messagingSenderId: "24003070752",
    appId: "PASTE_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const { useState, useEffect } = React;

function App() {
    const [state, setState] = useState({ bank: 0, lastUser: "..." });
    const [balance, setBalance] = useState(100);
    const [username, setUsername] = useState("Player");

    useEffect(() => {
        if (window.Telegram?.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            const user = tg.initDataUnsafe?.user;
            if (user) setUsername(user.username || user.first_name);
        }

        firebase.auth().signInAnonymously();

        const ref = db.ref("live_arena_v1");

        ref.on("value", (snap) => {
            const data = snap.val() || { bank: 0, lastUser: "..." };
            setState(data);
        });
    }, []);

    const handleBet = (val) => {
        if (balance < val) return;

        setBalance(prev => prev - val);

        db.ref("live_arena_v1").update({
            bank: firebase.database.ServerValue.increment(val),
            lastUser: username
        });
    };

    return (
        <div className="flex flex-col h-screen max-w-md mx-auto p-6">
            
            {/* HEADER */}
            <div className="flex justify-between items-center mb-8">
                <div>
                    <h1 className="text-xl font-black italic text-blue-500 uppercase">Arena Pro</h1>
                    <div className="flex items-center gap-1 mt-1">
                        <div className="online-dot"></div>
                        <span className="text-xs text-zinc-500">Live</span>
                    </div>
                </div>
                <div className="bg-[#1c1c1e] px-4 py-2 rounded-xl">
                    {balance.toFixed(2)} TON
                </div>
            </div>

            {/* MAIN */}
            <div className="flex-1 flex flex-col justify-center">
                <div className="card-grad rounded-3xl p-8 text-center">
                    <p className="text-xs text-zinc-500 mb-2">Банк</p>
                    <h2 className="text-5xl font-bold mb-6">
                        {state.bank.toFixed(2)}
                    </h2>

                    <img 
                        src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${state.lastUser}`} 
                        className="w-24 h-24 mx-auto mb-4"
                    />

                    <p className="text-sm text-zinc-400">@{state.lastUser}</p>
                </div>
            </div>

            {/* BETS */}
            <div className="grid grid-cols-4 gap-3 mt-6">
                {[1,5,10,25].map(v => (
                    <button key={v} onClick={() => handleBet(v)} className="btn-bet h-14 rounded-xl">
                        {v}
                    </button>
                ))}
            </div>

        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
