<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>TON Arena</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <style>
    :root {
      --bg0: #05060a;
      --bg1: #090b12;
      --panel: rgba(255,255,255,0.06);
      --panel2: rgba(255,255,255,0.08);
      --line: rgba(255,255,255,0.10);
      --text: #eef3ff;
      --muted: rgba(255,255,255,0.58);
      --accent: #5b8cff;
      --accent2: #8b5cf6;
      --good: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --shadow: 0 18px 50px rgba(0,0,0,.42);
      --radius: 28px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(91,140,255,.18), transparent 28%),
        radial-gradient(circle at 18% 18%, rgba(139,92,246,.12), transparent 24%),
        radial-gradient(circle at 88% 5%, rgba(34,197,94,.08), transparent 18%),
        linear-gradient(180deg, #0c0f17 0%, #05060a 55%, #000 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: .28;
      mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
    }

    button, input {
      font: inherit;
    }

    .app {
      max-width: 470px;
      margin: 0 auto;
      padding: 14px 14px 108px;
      position: relative;
      z-index: 1;
    }

    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .glass-strong {
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.06);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .muted { color: var(--muted); }
    .soft-line { border: 1px solid rgba(255,255,255,.08); }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.09);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .04em;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
    }
    .badge.good { background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.18); }
    .badge.warn { background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.18); }
    .badge.blue { background: rgba(91,140,255,.12); border-color: rgba(91,140,255,.18); }

    .btn-main {
      background: linear-gradient(180deg, rgba(91,140,255,1), rgba(70,119,250,1));
      box-shadow: 0 10px 28px rgba(91,140,255,.24), inset 0 1px 0 rgba(255,255,255,.18);
      color: #fff;
      border: none;
    }
    .btn-green {
      background: linear-gradient(180deg, rgba(34,197,94,1), rgba(22,163,74,1));
      box-shadow: 0 10px 28px rgba(34,197,94,.20), inset 0 1px 0 rgba(255,255,255,.18);
      color: #fff;
      border: none;
    }
    .btn-dark {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: #fff;
    }
    .btn-danger {
      background: rgba(239,68,68,.10);
      border: 1px solid rgba(239,68,68,.16);
      color: #fff;
    }

    .btn-tab {
      border: none;
      color: rgba(255,255,255,.70);
      background: transparent;
      border-radius: 18px;
      padding: 12px 8px;
      font-weight: 800;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .btn-tab.active {
      color: #fff;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.07);
    }

    .nav-ic {
      width: 17px;
      height: 17px;
      border-radius: 999px;
      background: rgba(255,255,255,.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }
    .btn-tab.active .nav-ic {
      background: linear-gradient(180deg, rgba(91,140,255,1), rgba(139,92,246,1));
    }

    .input {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.25);
      color: #fff;
      padding: 14px 14px;
      outline: none;
      font-size: 15px;
    }
    .input:focus {
      border-color: rgba(91,140,255,.40);
      box-shadow: 0 0 0 3px rgba(91,140,255,.10);
    }

    .scanline {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,.06), transparent);
      transform: translateY(-100%);
      animation: scan 5.2s linear infinite;
      opacity: .40;
    }
    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    @keyframes floaty {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    .floaty { animation: floaty 4s ease-in-out infinite; }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: .92; }
      50% { transform: scale(1.03); opacity: 1; }
    }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }

    @keyframes portal {
      0%   { transform: rotate(0deg) scale(.88); opacity:.40; }
      50%  { transform: rotate(180deg) scale(1.02); opacity:1; }
      100% { transform: rotate(360deg) scale(.90); opacity:.45; }
    }

    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(91,140,255,.0), 0 0 0 0 rgba(139,92,246,.0); }
      50% { box-shadow: 0 0 0 18px rgba(91,140,255,.08), 0 0 0 36px rgba(139,92,246,.05); }
    }

    .portal-wrap {
      width: 138px;
      height: 138px;
      border-radius: 999px;
      position: relative;
      margin: 0 auto;
      animation: portal 1.6s linear infinite;
    }
    .portal-ring {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.20) 0 14%, transparent 14.5% 20%, rgba(255,255,255,.15) 20.5% 24%, transparent 24.5% 31%, rgba(91,140,255,.40) 31.5% 35%, transparent 35.5% 44%, rgba(139,92,246,.34) 44.5% 49%, transparent 49.5% 100%);
      filter: drop-shadow(0 0 20px rgba(91,140,255,.35));
      animation: glowPulse 1.6s ease-in-out infinite;
    }
    .portal-core {
      position: absolute;
      inset: 28px;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.9), rgba(255,255,255,.16) 20%, rgba(91,140,255,.08) 44%, rgba(0,0,0,.75) 100%);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
    }

    .shell {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.12), transparent 17%),
        radial-gradient(circle at 82% 18%, rgba(139,92,246,.22), transparent 18%),
        linear-gradient(135deg, rgba(16,185,129,.82) 0%, rgba(59,130,246,.86) 22%, rgba(236,72,153,.90) 48%, rgba(245,158,11,.82) 72%, rgba(34,197,94,.86) 100%);
      box-shadow: 0 20px 70px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.08);
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(155deg, rgba(0,0,0,.20) 0 32%, transparent 32% 56%, rgba(0,0,0,.10) 56% 100%),
        radial-gradient(circle at center, transparent 0 26%, rgba(255,255,255,.06) 26.5% 27.5%, transparent 28%);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .shell::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 42%, rgba(0,0,0,.22) 100%);
      pointer-events: none;
    }

    .arena-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 26px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.07) 0 2%, transparent 3%),
        radial-gradient(circle at 50% 50%, transparent 0 38%, rgba(255,255,255,.05) 38.5% 39.5%, transparent 40%),
        linear-gradient(180deg, rgba(7,9,16,.96), rgba(12,14,24,.96));
      box-shadow: 0 20px 70px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.04);
    }

    .arena-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: .25;
      pointer-events: none;
      mask-image: radial-gradient(circle at center, black 45%, transparent 100%);
    }

    .arena-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 58%, rgba(0,0,0,.10) 59% 100%);
      pointer-events: none;
    }

    .arena-inner {
      position: absolute;
      inset: 16px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
      background: radial-gradient(circle at center, rgba(255,255,255,.08), transparent 44%);
    }

    .player-zone {
      position: absolute;
      top: 0;
      height: 100%;
      overflow: hidden;
      border-right: 1px solid rgba(255,255,255,.10);
      box-shadow: inset 0 0 50px rgba(255,255,255,.06);
    }

    .player-zone::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,.18), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 32%);
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: .9;
    }

    .zone-label {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
      width: 100%;
      padding: 0 8px;
      pointer-events: none;
    }

    .avatar-ring {
      width: 54px;
      height: 54px;
      border-radius: 999px;
      padding: 3px;
      background: linear-gradient(135deg, rgba(255,255,255,.26), rgba(255,255,255,.08));
      box-shadow: 0 0 22px rgba(255,255,255,.14), 0 0 50px rgba(0,0,0,.18);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.12);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-fallback {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .05em;
      text-shadow: 0 1px 8px rgba(0,0,0,.45);
    }

    .zone-title {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .06em;
      text-transform: uppercase;
      text-shadow: 0 1px 8px rgba(0,0,0,.36);
    }

    .zone-sub {
      font-size: 11px;
      color: rgba(255,255,255,.80);
      text-shadow: 0 1px 8px rgba(0,0,0,.36);
    }

    .center-core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 158px;
      height: 158px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 28%, rgba(255,255,255,.35), transparent 18%),
        radial-gradient(circle at center, rgba(9,13,24,.82) 0 48%, rgba(10,20,40,.92) 60%, rgba(0,0,0,.96) 100%);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        0 0 0 10px rgba(255,255,255,.03),
        0 0 55px rgba(0,0,0,.30);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 8;
    }

    .center-core .title {
      font-weight: 900;
      letter-spacing: .10em;
      font-size: 10px;
      color: rgba(255,255,255,.78);
      text-transform: uppercase;
    }

    .center-core .value {
      margin-top: 6px;
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
    }

    .center-core .sub {
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255,255,255,.62);
      line-height: 1.25;
    }

    .pointer-line {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 18;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.10);
      font-size: 11px;
      color: rgba(255,255,255,.88);
    }

    .arrow-wrap {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .arrow-core {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #fff, #f5f5f5 20%, #cbd5e1 100%);
      box-shadow: 0 0 18px rgba(255,255,255,.42), 0 0 30px rgba(91,140,255,.28);
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .arrow-head {
      width: 0;
      height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 16px solid rgba(255,255,255,.96);
      filter: drop-shadow(0 0 8px rgba(255,255,255,.45));
      transform: translateY(14px);
    }

    .top-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
    }

    .mini-stat {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      min-width: 0;
    }
    .mini-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .18em;
      font-weight: 900;
      color: rgba(255,255,255,.55);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-value {
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-hint {
      font-size: 11px;
      color: rgba(255,255,255,.58);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .section-title {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.55);
    }

    .row-divider {
      height: 1px;
      background: rgba(255,255,255,.08);
      margin: 10px 0;
    }

    .thin-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
    .thin-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 999px; }
    .thin-scroll::-webkit-scrollbar-track { background: transparent; }

    .nav-bar {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: min(470px, 100%);
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      z-index: 40;
      background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.48) 14%, rgba(0,0,0,.74));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .nav-inner {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 10px;
      border-radius: 22px;
      background: rgba(10,12,18,.78);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 14px 40px rgba(0,0,0,.35);
    }

    .nav-btn {
      border: none;
      border-radius: 18px;
      padding: 12px 8px;
      color: rgba(255,255,255,.70);
      font-weight: 800;
      letter-spacing: .02em;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: transparent;
    }

    .nav-btn.active {
      color: #fff;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.07);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.68);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 120;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .modal {
      width: min(460px, 100%);
      border-radius: 28px;
      padding: 16px;
      background: linear-gradient(180deg, rgba(18,20,28,.98), rgba(9,10,16,.98));
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      position: relative;
      overflow: hidden;
    }

    .modal::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 16%, rgba(91,140,255,.14), transparent 16%),
        radial-gradient(circle at 82% 12%, rgba(139,92,246,.14), transparent 16%);
      pointer-events: none;
    }

    .support-mask {
      position: fixed;
      inset: 0;
      z-index: 130;
      background: rgba(0,0,0,.70);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .support-sheet {
      width: min(460px, 100%);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(18,20,28,.98), rgba(8,9,14,.98));
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 24px 70px rgba(0,0,0,.50);
      padding: 16px;
      position: relative;
    }

    .intro-mask {
      position: fixed;
      inset: 0;
      z-index: 200;
      background:
        radial-gradient(circle at center, rgba(91,140,255,.20), transparent 18%),
        radial-gradient(circle at center, rgba(139,92,246,.14), transparent 32%),
        linear-gradient(180deg, #05060a 0%, #000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIntro 1.2s ease forwards;
    }

    @keyframes fadeIntro {
      0%   { opacity: 1; }
      80%  { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .space-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .18em;
      font-weight: 900;
      color: rgba(255,255,255,.54);
    }

    .empty-box {
      padding: 20px;
      border-radius: 20px;
      border: 1px dashed rgba(255,255,255,.12);
      color: rgba(255,255,255,.64);
      text-align: center;
      background: rgba(255,255,255,.03);
    }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .list-item:last-child {
      border-bottom: 0;
    }

    .small-icon {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.10);
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.06);
    }

    .small-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.05);
    }

    .toggle button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      color: rgba(255,255,255,.72);
      background: transparent;
      font-weight: 900;
    }

    .toggle button.active {

      return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;

    function safeNick(nick) {
      return String(nick || "").trim().replace(/\s+/g, " ").slice(0, 18);
    }

    function nickKey(nick) {
      return safeNick(nick)
        .toLowerCase()
        .replace(/[^a-zа-я0-9_ -]/gi, "_")
        .replace(/\s/g, "_")
        .replace(/_+/g, "_");
    }

    function shortNick(s) {
      if (!s) return "—";
      return s.length > 12 ? s.slice(0, 12) + "…" : s;
    }

    function shortId(s) {
      if (!s) return "—";
      return s.length > 14 ? s.slice(0, 6) + "…" + s.slice(-4) : s;
    }

    function formatTON(v) {
      const n = Number(v || 0);
      if (!isFinite(n)) return "0";
      return Number.isInteger(n) ? String(n) : n.toFixed(2).replace(/\.?0+$/, "");
    }

    function seededColor(seed) {
      let h = 0;
      const s = String(seed || "seed");
      for (let i = 0; i < s.length; i++) h = ((h * 31) + s.charCodeAt(i)) >>> 0;
      const colors = [
        ["#3b82f6", "#1d4ed8"],
        ["#8b5cf6", "#6d28d9"],
        ["#ec4899", "#db2777"],
        ["#f59e0b", "#d97706"],

        ["#f97316", "#ea580c"],
        ["#22c55e", "#16a34a"]
      ];
      const c = colors[h % colors.length];
      return `linear-gradient(135deg, ${c[0]}, ${c[1]})`;
    }

      render();
    }

    function activeOnlineCount() {
      const now = Date.now();
      return Object.values(state.sessionsObj || {})
        .filter(s => now - Number(s.lastSeen || 0) < ACTIVE_SESSION_MS)
        .length;
    }

    function playersArr() {
      const arr = Object.values(state.playersObj || {});
      arr.sort((a, b) => Number(a.joinedAt || 0) - Number(b.joinedAt || 0));
      return arr;
    }

    function totalBank() {
      return playersArr().reduce((sum, p) => sum + Number(p.amount || 0), 0);
    }

    function feeBase() {
      const arr = playersArr();
      if (!arr.length) return 0;
      return Math.min(...arr.map(p => Number(p.amount || 0)));
    }

    function commissionAmount() {
      return +(Math.min(totalBank(), feeBase() * FEE_RATE)).toFixed(2);
    }

    function payoutAmount() {
      return +(totalBank() - commissionAmount()).toFixed(2);
    }

    function shares() {
      const arr = playersArr();
      const total = arr.reduce((s, p) => s + Number(p.amount || 0), 0);
      if (!arr.length) return [];
      if (total <= 0) return arr.map(p => ({ ...p, share: 1 / arr.length }));
      return arr.map(p => ({ ...p, share: Number(p.amount || 0) / total }));
    }

    function findWinnerByX(xNorm) {
      const arr = shares();
      if (!arr.length) return null;
      let acc = 0;
      for (const p of arr) {
        const next = acc + p.share;
        if (xNorm >= acc && xNorm <= next) return p;
        acc = next;
      }
      return arr[arr.length - 1] || null;
    }

    function computeArenaStats() {
      const arr = playersArr();
      const total = arr.reduce((s, p) => s + Number(p.amount || 0), 0);
      const max = arr.reduce((m, p) => Math.max(m, Number(p.amount || 0)), 0);
      const top = arr.reduce((best, p) => Number(p.amount || 0) > Number(best?.amount || 0) ? p : best, null);
      return { total, max, top };
    }

    function updateSessionTouch(extra = {}) {
      const sessionRef = db.ref(`rooms/${state.roomId}/sessions/${sessionId}`);
      return sessionRef.update({
        sessionId,
        roomId: state.roomId,
        nickname: state.nickname || "",
        mode: state.mode,
        lastSeen: Date.now(),
        updatedAt: Date.now(),
        ...extra
      });
    }

    function attachRoom(roomId) {
      if (roomRef) roomRef.off();
      if (statsRef) statsRef.off();

      roomRef = db.ref(`rooms/${roomId}`);
      statsRef = state.nickname ? db.ref(`stats/${nickKey(state.nickname)}`) : null;

      roomRef.on("value", snap => {
        const data = snap.val() || {};
        const players = data.players || {};
        const sessions = data.sessions || {};
        const history = Array.isArray(data.arrowHistory)
          ? data.arrowHistory
          : data.arrowHistory && typeof data.arrowHistory === "object"
            ? Object.values(data.arrowHistory)
            : [];

        state.playersObj = players;
        state.sessionsObj = sessions;
        state.room = {
          status: data.status || "waiting",
          timer: Number(data.timer ?? ROUND_SECONDS),
          host: data.host || "",
          timerOwner: data.timerOwner || "",
          phaseText: data.phaseText || "waiting",
          winner: data.winner || null,
          lastGame: data.lastGame || null,
          arrowHistory: history
        };

        render();
      });

      roomRef.child("sessions").on("value", snap => {
        state.sessionsObj = snap.val() || {};
        render();
      });

      if (state.nickname) {
        statsRef = db.ref(`stats/${nickKey(state.nickname)}`);
        statsRef.on("value", snap => {
          state.stats = snap.val() || { betsCount: 0, wins: 0, totalBet: 0, refs: 0 };
          render();
        });
      }

      startHeartbeat();
      render();
    }

    function startHeartbeat() {
      if (sessionTouchTimer) clearInterval(sessionTouchTimer);
      updateSessionTouch({ status: "active" }).catch(() => {});
      sessionTouchTimer = setInterval(() => {
        updateSessionTouch({ status: "active" }).catch(() => {});
      }, 3000);
    }

    function stopTimerLoop() {
      if (timerOwnerLoop) {
        clearInterval(timerOwnerLoop);
        timerOwnerLoop = null;
      }
    }

    function maybeStartTimerLoop() {
      stopTimerLoop();

      if (state.room.status !== "betting") return;
      if (state.room.timerOwner !== sessionId) return;

      timerOwnerLoop = setInterval(async () => {
        try {
          const timerRef = db.ref(`rooms/${state.roomId}/timer`);
          await timerRef.transaction(current => {
            const next = Math.max(0, Number(current || ROUND_SECONDS) - 1);
            return next;
          }, async (err, committed, snap) => {
            if (err || !committed || !snap) return;
            const current = Number(snap.val() || 0);
            if (current <= 0) {
              stopTimerLoop();
              await resolveRound();
            }
          });
        } catch (e) {
          console.error(e);
        }
      }, 1000);
    }

      state.gateOpen = false;
      state.notice = state.lang === "ru" ? "Ник сохранён" : "Nickname saved";
      render();
      await updateSessionTouch({ nickname: clean });
      if (statsRef) statsRef.off();

      attachRoom(state.roomId);

    async function joinOrUpdateBet() {
      const nick = safeNick(state.nickname);
      if (!nick) {
        alert(state.lang === "ru" ? "Сначала введи ник" : "Enter nickname first");
        return;
      }

      const amount = Number(state.betAmount);
      if (!amount || amount <= 0) {
        alert(state.lang === "ru" ? "Ставка должна быть больше 0" : "Bet must be greater than 0");
        return;
      }

      const key = nickKey(nick);
      const playerRef = db.ref(`rooms/${state.roomId}/players/${key}`);
      const existingSnap = await playerRef.once("value");
      const existing = existingSnap.val();

      const payload = {
        id: key,
        nickname: nick,
        nicknameKey: key,
        amount,
        color: existing?.color || seededColor(key + state.roomId),
        avatar: existing?.avatar || randomAvatar(key),
        joinedAt: existing?.joinedAt || Date.now(),
        updatedAt: Date.now(),
        lastSeen: Date.now(),
        mode: state.mode,
        sessionId
      };

      await playerRef.set(payload);
      await updateSessionTouch({ nickname: nick, status: "joined" });

      const sref = db.ref(`stats/${key}`);
      await sref.transaction(cur => {
        const d = cur || { betsCount: 0, wins: 0, totalBet: 0, refs: 0 };
        d.betsCount = Number(d.betsCount || 0) + 1;
        d.totalBet = +(Number(d.totalBet || 0) + amount).toFixed(2);
        d.lastBetAt = Date.now();
        return d;
      });

      const roomSnap = await db.ref(`rooms/${state.roomId}`).once("value");
      const roomData = roomSnap.val() || {};
      const count = Object.keys(roomData.players || {}).length + (existing ? 0 : 1);

      if ((roomData.status || "waiting") === "waiting" && count >= 2) {
        await db.ref(`rooms/${state.roomId}`).update({
          status: "betting",
          timer: ROUND_SECONDS,
          phaseText: "betting",
          host: roomData.host || key,
          timerOwner: sessionId
        });
      } else if ((roomData.status || "waiting") === "betting" && !roomData.timerOwner) {
        await db.ref(`rooms/${state.roomId}/timerOwner`).set(sessionId);
      }

      state.notice = state.lang === "ru" ? "Ставка добавлена" : "Bet updated";
      render();
    }

    async function startRound() {
      const nick = safeNick(state.nickname);
      if (!nick) {
        alert(state.lang === "ru" ? "Сначала введи ник" : "Enter nickname first");
        return;
      }

      const arr = playersArr();
      if (arr.length < 2) {
        alert(state.lang === "ru" ? "Нужно минимум 2 игрока" : "Need at least 2 players");
        return;
      }

      const key = nickKey(nick);
      await db.ref(`rooms/${state.roomId}`).update({
        status: "betting",
        timer: ROUND_SECONDS,
        host: key,
        winner: null,
        phaseText: "betting",
        startedAt: Date.now(),
        timerOwner: sessionId
      });

      state.notice = state.lang === "ru" ? "Раунд запущен" : "Round started";
      render();
    }

    async function resetRoom() {
      const key = nickKey(state.nickname || "host");
      await db.ref(`rooms/${state.roomId}`).set({
        status: "waiting",
        timer: ROUND_SECONDS,
        host: key,
        timerOwner: sessionId,
        winner: null,
        lastGame: null,
        startedAt: null,
        phaseText: "waiting",
        arrowHistory: [],
        players: state.playersObj || {},
        sessions: state.sessionsObj || {}
      });
      state.notice = state.lang === "ru" ? "Комната сброшена" : "Room reset";
      render();
    }

    async function resolveRound() {
      const snap = await db.ref(`rooms/${state.roomId}`).once("value");
      const data = snap.val() || {};
      const arr = Object.values(data.players || {}).sort((a, b) => Number(a.joinedAt || 0) - Number(b.joinedAt || 0));

      if (arr.length < 2) {
        await db.ref(`rooms/${state.roomId}`).update({
          status: "waiting",
          timer: ROUND_SECONDS,
          phaseText: "waiting",
          winner: null
        });
        return;
      }

      const shell = document.getElementById("arenaShell");
      const board = shell ? shell.getBoundingClientRect() : { width: 320, height: 320 };
      const size = Math.max(260, Math.min(board.width || 320, 380));
      const margin = 18;
      const usable = size - margin * 2;

      let x = margin + Math.random() * usable;
      let y = margin + Math.random() * usable;
      let vx = (Math.random() * 6 + 5) * (Math.random() < 0.5 ? -1 : 1);
      let vy = (Math.random() * 5 + 4) * (Math.random() < 0.5 ? -1 : 1);
      let angle = Math.random() * 360;

      state.arrow = { active: true, x, y, vx, vy, angle };
      state.room.status = "spinning";
      state.room.phaseText = "spinning";
      render();

      let start = performance.now();
      const duration = 10000 + Math.random() * 1300;
      const drag = 0.997;
      const bounce = 0.93;
      const gravity = 0.01;

      if (arrowLoop) cancelAnimationFrame(arrowLoop);

      const step = (now) => {
        const elapsed = now - start;

        vx *= drag;
        vy *= drag;
        vy += gravity * 0.2;

        x += vx;
        y += vy;
        angle += 20 + Math.random() * 4;

        const min = margin;
        const max = margin + usable;

        if (x <= min) { x = min; vx = Math.abs(vx) * bounce; }
        if (x >= max) { x = max; vx = -Math.abs(vx) * bounce; }
        if (y <= min) { y = min; vy = Math.abs(vy) * bounce; }
        if (y >= max) { y = max; vy = -Math.abs(vy) * bounce; }

        const speed = Math.sqrt(vx * vx + vy * vy);
        state.arrow = { active: true, x, y, vx, vy, angle };
        render();

        if (elapsed < duration && speed > 0.28) {
          arrowLoop = requestAnimationFrame(step);
          return;
        }

        const xNorm = Math.max(0, Math.min(1, (x - min) / usable));
        const winner = findWinnerByX(xNorm) || arr[Math.floor(Math.random() * arr.length)];
        state.arrow.active = false;
        render();

        setTimeout(async () => {
          const latestSnap = await db.ref(`rooms/${state.roomId}`).once("value");
          const latest = latestSnap.val() || {};
          const latestPlayers = Object.values(latest.players || {});
          const bank = latestPlayers.reduce((s, p) => s + Number(p.amount || 0), 0);
          const fee = commissionAmount();
          const payout = +(bank - fee).toFixed(2);

          await db.ref(`rooms/${state.roomId}`).update({
            status: "finished",
            timer: 0,
            phaseText: "finished",
            winner: {
              nickname: winner.nickname,
              nicknameKey: winner.nicknameKey,
              amount: winner.amount
            },
            lastGame: {
              at: Date.now(),
              roomId: state.roomId,
              bank,
              payout,
              fee,
              winnerName: winner.nickname,
              winnerKey: winner.nicknameKey,
              winnerAmount: winner.amount
            }
          });

          await db.ref(`stats/${winner.nicknameKey}`).transaction(cur => {
            const d = cur || { betsCount: 0, wins: 0, totalBet: 0, refs: 0 };
            d.wins = Number(d.wins || 0) + 1;
            d.lastWinAt = Date.now();
            return d;
          });

          const histSnap = await db.ref(`rooms/${state.roomId}/arrowHistory`).once("value");
          const histArr = Array.isArray(histSnap.val()) ? histSnap.val() : [];
          const next = [...histArr, {
            at: Date.now(),
            roomId: state.roomId,
            winnerName: winner.nickname,
            winnerKey: winner.nicknameKey,
            bank,
            fee,
            payout
          }].slice(-12);

          await db.ref(`rooms/${state.roomId}/arrowHistory`).set(next);

          setTimeout(async () => {
            await db.ref(`rooms/${state.roomId}`).update({
              status: "waiting",
              timer: ROUND_SECONDS,
              phaseText: "waiting",
              winner: null,
              timerOwner: sessionId
            });
          }, 7000);
        }, 250);
      };

      arrowLoop = requestAnimationFrame(step);
    }

    function quickDemoPlayer() {
      const base = safeNick(state.nickname || "player");
      const demo = `${base}_${Math.floor(Math.random() * 1000)}`;
      state.nickname = demo;
      state.gateOpen = false;
      localStorage.setItem("tonarena_nick", demo);
      render();
      saveNickname().then(() => {
        state.betAmount = Math.max(1, Number(state.betAmount || 1));
        joinOrUpdateBet();
      });
    }

    function switchMode(next) {
      state.mode = next;
      localStorage.setItem("tonarena_mode", next);
      updateSessionTouch({ mode: next }).catch(() => {});
      render();
    }

    function switchLang(next) {
      state.lang = next;
      localStorage.setItem("tonarena_lang", next);
      render();
    }

    function setTab(next) {
      state.tab = next;
      render();
    }

    async function copyReferral() {
      const link = `${location.origin}${location.pathname}?ref=${encodeURIComponent(makeReferralCode(state.nickname || "friend"))}`;
      try {
        await navigator.clipboard.writeText(link);
        state.copied = true;
        render();
        setTimeout(() => { state.copied = false; render(); }, 1400);
      } catch (e) {
        alert(link);
      }
    }

    function supportOpen() {
      state.supportOpen = true;
      render();
    }

    function supportClose() {
      state.supportOpen = false;
      render();
    }

    function changeNick() {
      state.gateOpen = true;
      render();
      setTimeout(() => {
        const input = document.getElementById("gateNick");
        if (input) input.focus();
      }, 50);
    }

    function handleClick(action) {
      if (action === "gate-enter") {
        saveNickname();
        return;
      }
      if (action === "save-nick") {
        saveNickname();
        return;
      }
      if (action === "open-room") {
        openRoom();
        return;
      }
      if (action === "join-bet") {
        joinOrUpdateBet();
        return;
      }
      if (action === "start-round") {
        startRound();
        return;
      }
      if (action === "reset-room") {
        resetRoom();
        return;
      }
      if (action === "quick-demo") {
        quickDemoPlayer();
        return;
      }
      if (action === "toggle-mode") {
        switchMode(state.mode === "test" ? "real" : "test");
        return;
      }
      if (action === "lang-ru") {
        switchLang("ru");
        return;
      }
      if (action === "lang-en") {
        switchLang("en");
        return;
      }
      if (action === "mode-test") {
        switchMode("test");
        return;
      }
      if (action === "mode-real") {
        switchMode("real");
        return;
      }
      if (action === "copy-ref") {
        copyReferral();
        return;
      }
      if (action === "support-open") {
        supportOpen();
        return;
      }
      if (action === "support-close") {
        supportClose();
        return;
      }
      if (action === "change-nick") {
        changeNick();
        return;
      }
      if (action === "tab-games") {
        setTab("games");
        return;
      }
      if (action === "tab-refs") {
        setTab("refs");
        return;
      }
      if (action === "tab-profile") {
        setTab("profile");
        return;
      }
      if (action === "open-profile") {
        setTab("profile");
        return;
      }
    }

    document.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-action]");
      if (!btn) return;
      handleClick(btn.dataset.action);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        if (state.gateOpen && !state.nickname) {
          saveNickname();
        }
      }
    });

    async function bootstrap() {
      startHeartbeat();
      attachRoom(state.roomId);

      const url = new URL(location.href);
      const ref = url.searchParams.get("ref");
      if (ref && !localStorage.getItem("tonarena_ref")) {
        localStorage.setItem("tonarena_ref", ref);
      }

      if (state.nickname) {
        state.gateOpen = false;
        state.tab = "games";
        render();
      }

      if (introTimer) clearTimeout(introTimer);
      introTimer = setTimeout(() => {
        state.intro = false;
        render();
      }, INTRO_MS);
    }

    bootstrap();
    render();
  </script>
</body>
</html>
