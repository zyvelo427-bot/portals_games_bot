  <style>
    :root{
      --bg:#05060a;
      --panel:rgba(255,255,255,.055);
      --panel2:rgba(255,255,255,.075);
      --line:rgba(255,255,255,.09);
      --text:#eef3ff;
      --muted:rgba(255,255,255,.58);
      --accent:#5b8cff;
      --accent2:#8b5cf6;
      --good:#22c55e;
      --warn:#f59e0b;
      --danger:#ef4444;
      --shadow:0 18px 50px rgba(0,0,0,.42);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top, rgba(91,140,255,.18), transparent 26%),
        radial-gradient(circle at 20% 18%, rgba(139,92,246,.12), transparent 24%),
        radial-gradient(circle at 90% 4%, rgba(34,197,94,.08), transparent 20%),
        linear-gradient(180deg,#0b0d14 0%, #05060a 56%, #000 100%);
      color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.023) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.023) 1px, transparent 1px);
      background-size:34px 34px;
      mask-image:radial-gradient(circle at center, black 42%, transparent 100%);
      opacity:.28;
    }

    .app{
      max-width:460px;
      margin:0 auto;
      padding:14px 14px 88px;
      position:relative;
    }

    .glass{
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.035));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .glass-strong{
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.045));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.08);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .muted{color:var(--muted)}
    .soft-line{border:1px solid rgba(255,255,255,.08)}
    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.09);
    }
    .btn-main{
      background:linear-gradient(180deg, rgba(91,140,255,1), rgba(70,119,250,1));
      box-shadow:0 10px 28px rgba(91,140,255,.24), inset 0 1px 0 rgba(255,255,255,.18);
    }
    .btn-green{
      background:linear-gradient(180deg, rgba(34,197,94,1), rgba(22,163,74,1));
      box-shadow:0 10px 28px rgba(34,197,94,.20), inset 0 1px 0 rgba(255,255,255,.18);
    }
    .btn-dark{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }
    .btn-danger{
      background:rgba(239,68,68,.12);
      border:1px solid rgba(239,68,68,.16);
    }
    .btn-tab{
      background:transparent;
      border:none;
      color:rgba(255,255,255,.70);
    }
    .btn-tab.active{
      color:#fff;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
    }
    .scanline{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:linear-gradient(to bottom, transparent, rgba(255,255,255,.06), transparent);
      transform:translateY(-100%);
      animation:scan 5.2s linear infinite;
      opacity:.42;
    }
    @keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
    @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.92}50%{transform:scale(1.03);opacity:1}}
    .floaty{animation:floaty 4s ease-in-out infinite}
    .pulse{animation:pulse 2.4s ease-in-out infinite}

    .section{
      border-radius:28px;
      overflow:hidden;
      position:relative;
    }

    .hero{
      padding:16px;
      border-radius:28px;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.14), transparent 18%),
        radial-gradient(circle at 82% 18%, rgba(139,92,246,.20), transparent 20%),
        linear-gradient(135deg, rgba(16,185,129,.85) 0%, rgba(59,130,246,.88) 22%, rgba(236,72,153,.90) 50%, rgba(245,158,11,.84) 74%, rgba(34,197,94,.84) 100%);
      box-shadow:0 20px 70px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.08);
      position:relative;
      overflow:hidden;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(155deg, rgba(0,0,0,.20) 0 34%, transparent 34% 55%, rgba(0,0,0,.10) 55% 100%),
        radial-gradient(circle at center, transparent 0 26%, rgba(255,255,255,.06) 26.5% 27.5%, transparent 28%);
      mix-blend-mode:screen;
      pointer-events:none;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at center, transparent 44%, rgba(0,0,0,.22) 100%);
      pointer-events:none;
    }

    .grid-card{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:12px 14px;
    }

    .arena-shell{
      position:relative;
      aspect-ratio:1 / 1;
      border-radius:26px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.08) 0 2%, transparent 3%),
        radial-gradient(circle at 50% 50%, transparent 0 38%, rgba(255,255,255,.05) 38.5% 39.5%, transparent 40%),
        linear-gradient(180deg, rgba(7,9,16,.96), rgba(12,14,24,.96));
      box-shadow:0 20px 70px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.04);
    }

    .arena-shell::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
      background-size:42px 42px;
      opacity:.25;
      pointer-events:none;
      mask-image:radial-gradient(circle at center, black 45%, transparent 100%);
    }

    .arena-shell::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 58%, rgba(0,0,0,.10) 59% 100%);
      pointer-events:none;
    }

    .arena-inner{
      position:absolute;
      inset:16px;
      border-radius:20px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at center, rgba(255,255,255,.08), transparent 44%);
    }

    .player-zone{
      position:absolute;
      top:0;
      height:100%;
      border-right:1px solid rgba(255,255,255,.10);
      box-shadow:inset 0 0 50px rgba(255,255,255,.06);
      overflow:hidden;
    }

    .player-zone::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,.18), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 32%);
      pointer-events:none;
      mix-blend-mode:screen;
      opacity:.9;
    }

    .zone-label{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      text-align:center;
      width:100%;
      padding:0 8px;
      pointer-events:none;
    }

    .avatar-ring{
      width:54px;
      height:54px;
      border-radius:999px;
      padding:3px;
      background:linear-gradient(135deg, rgba(255,255,255,.26), rgba(255,255,255,.08));
      box-shadow:0 0 22px rgba(255,255,255,.14), 0 0 50px rgba(0,0,0,.18);
    }

    .avatar{
      width:100%;
      height:100%;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.12);
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .avatar-fallback{
      font-size:12px;
      font-weight:900;
      letter-spacing:.05em;
      text-shadow:0 1px 8px rgba(0,0,0,.45);
    }

    .zone-title{
      font-size:12px;
      font-weight:900;
      letter-spacing:.06em;
      text-transform:uppercase;
      text-shadow:0 1px 8px rgba(0,0,0,.36);
    }
    .zone-sub{
      font-size:11px;
      color:rgba(255,255,255,.80);
      text-shadow:0 1px 8px rgba(0,0,0,.36);
    }

    .arrow-wrap{
      position:absolute;
      left:0;
      top:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:12;
    }
    .arrow-core{
      position:absolute;
      width:20px;
      height:20px;
      border-radius:999px;
      background:radial-gradient(circle at 30% 30%, #fff, #f5f5f5 20%, #cbd5e1 100%);
      box-shadow:0 0 18px rgba(255,255,255,.42), 0 0 30px rgba(91,140,255,.28);
      transform:translate(-50%, -50%);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .arrow-head{
      width:0;
      height:0;
      border-left:7px solid transparent;
      border-right:7px solid transparent;
      border-top:16px solid rgba(255,255,255,.96);
      filter:drop-shadow(0 0 8px rgba(255,255,255,.45));
      transform:translateY(14px);
    }

    .pointer-line{
      position:absolute;
      top:10px;
      right:10px;
      z-index:20;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(0,0,0,.28);
      border:1px solid rgba(255,255,255,.10);
      font-size:11px;
      color:rgba(255,255,255,.85);
    }

    .indicator{
      width:10px;
      height:10px;
      border-radius:999px;
      background:var(--good);
      box-shadow:0 0 12px rgba(34,197,94,.55);
    }

    .nav-bar{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:0;
      width:min(460px,100%);
      padding:10px 14px calc(10px + env(safe-area-inset-bottom));
      z-index:40;
      background:linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.46) 14%, rgba(0,0,0,.72));
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }

    .nav-inner{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      padding:10px;
      border-radius:22px;
      background:rgba(10,12,18,.76);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 14px 40px rgba(0,0,0,.35);
    }

    .nav-btn{
      border:none;
      border-radius:18px;
      padding:12px 8px;
      color:rgba(255,255,255,.70);
      font-weight:800;
      letter-spacing:.02em;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      background:transparent;
    }
    .nav-btn.active{
      color:#fff;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.07);
    }
    .nav-ic{
      width:16px;
      height:16px;
      border-radius:999px;
      background:rgba(255,255,255,.16);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }
    .nav-btn.active .nav-ic{background:linear-gradient(180deg, rgba(91,140,255,1), rgba(139,92,246,1))}
    .thin-scroll::-webkit-scrollbar{height:6px;width:6px}
    .thin-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:999px}
    .thin-scroll::-webkit-scrollbar-track{background:transparent}

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.62);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:100;
      padding:16px;
    }

    .modal{
      width:min(430px,100%);
      border-radius:28px;
      padding:16px;
      background:linear-gradient(180deg, rgba(20,23,34,.98), rgba(9,10,16,.98));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 24px 80px rgba(0,0,0,.48);
      position:relative;
      overflow:hidden;
    }
    .modal::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(91,140,255,.12), transparent 18%),
        radial-gradient(circle at 80% 10%, rgba(139,92,246,.12), transparent 18%);
      pointer-events:none;
    }

    .input{
      width:100%;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.26);
      color:#fff;
      padding:14px 14px;
      outline:none;
      font-size:15px;
    }
    .input:focus{
      border-color:rgba(91,140,255,.34);
      box-shadow:0 0 0 3px rgba(91,140,255,.12);
    }

    .support-mask{
      position:fixed;
      inset:0;
      z-index:110;
      background:rgba(0,0,0,.70);
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:16px;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .support-sheet{
      width:min(430px,100%);
      border-radius:24px;
      background:linear-gradient(180deg, rgba(18,20,28,.98), rgba(8,9,14,.98));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 24px 70px rgba(0,0,0,.50);
      padding:16px;
      position:relative;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.04em;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }
    .badge.good{background:rgba(34,197,94,.10); border-color:rgba(34,197,94,.16)}
    .badge.warn{background:rgba(245,158,11,.10); border-color:rgba(245,158,11,.18)}
    .badge.blue{background:rgba(91,140,255,.10); border-color:rgba(91,140,255,.18)}

    .mini-stat{
      display:flex;
      flex-direction:column;
      gap:3px;
      padding:12px 14px;
      border-radius:18px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      min-width:0;
    }
    .mini-label{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.18em;
      font-weight:900;
      color:rgba(255,255,255,.56);
    }
    .mini-value{
      font-size:18px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .mini-hint{
      font-size:11px;
      color:rgba(255,255,255,.58);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .section-title{
      font-size:12px;
      font-weight:900;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(255,255,255,.55);
    }

    .row-divider{
      height:1px;
      background:rgba(255,255,255,.08);
      margin:10px 0;
    }
  </style>
</head>

      return LANGS[lang]?.[key] ?? LANGS.ru[key] ?? key;
    }

    function safeNick(nick){
      return String(nick || "").trim().replace(/\s+/g, " ").slice(0, 18);
    }

    function nickKey(nick){
      return safeNick(nick).toLowerCase().replace(/[^a-zа-я0-9_ -]/gi, "_").replace(/\s/g, "_");
    }

    function shortNick(s){
      if(!s) return "—";
      return s.length > 12 ? s.slice(0, 12) + "…" : s;
    }

    function formatTON(v){
      const n = Number(v || 0);
      if(!isFinite(n)) return "0";
      return Number.isInteger(n) ? String(n) : n.toFixed(2).replace(/\.?0+$/,'');
    }

    function seededColor(seed){
      let h = 0;
      for(let i=0;i<seed.length;i++) h = ((h * 31) + seed.charCodeAt(i)) >>> 0;
      const colors = [
        ["#3b82f6","#1d4ed8"],
        ["#8b5cf6","#6d28d9"],
        ["#ec4899","#db2777"],
        ["#f59e0b","#d97706"],
        ["#10b981","#059669"],
        ["#14b8a6","#0f766e"],
        ["#ef4444","#b91c1c"],
        ["#06b6d4","#0284c7"],
        ["#f97316","#ea580c"],
        ["#22c55e","#16a34a"]
      ];
      const c = colors[h % colors.length];
      return `linear-gradient(135deg, ${c[0]}, ${c[1]})`;
    }

    function makeReferralCode(nick){
      const base = nickKey(nick) || "guest";
      return `${base}-tonarena`;
    }

    function randomAvatar(seed){
      return `https://api.dicebear.com/9.x/identicon/svg?seed=${encodeURIComponent(seed || "guest")}`;
    }

    function useLocal(key, fallback){
      const [value, setValue] = useState(() => {
        try{
          const raw = localStorage.getItem(key);
          return raw != null ? JSON.parse(raw) : fallback;
        }catch{
          return fallback;
        }
      });
      useEffect(() => {
        try{
          localStorage.setItem(key, JSON.stringify(value));
        }catch{}
      }, [key, value]);
      return [value, setValue];
    }

    function getCommission(bank){
      return +(Number(bank || 0) * FEE_RATE).toFixed(2);
    }

    function getPayout(bank){
      return +(Number(bank || 0) - getCommission(bank)).toFixed(2);
    }

    function weightedPick(players){
      const arr = players
        .map(p => ({...p, amount:Number(p.amount || 0)}))
        .filter(p => p.amount > 0);

      const total = arr.reduce((s,p)=>s+p.amount,0);
      if(total <= 0) return arr[0] || null;

      const r = Math.random() * total;
      let a = 0;
      for(const p of arr){
        a += p.amount;
        if(r <= a) return p;
      }
      return arr[arr.length - 1] || null;
    }

    function computeShares(players){
      const total = players.reduce((s,p)=>s + Number(p.amount || 0), 0);
      if(total <= 0 && players.length){
        return players.map(p => ({...p, share: 1 / players.length}));
      }
      if(total <= 0) return [];
      return players.map(p => ({...p, share: Number(p.amount || 0) / total}));
    }

        if((data.status || "waiting") === "waiting" && count >= 2){
          await db.ref(roomPath).update({
            status:"betting",

            phaseText:"betting",

      function computeWinnerByX(finalX){
        if(!shares.length) return null;
        let acc = 0;
        for(const p of shares){
          const next = acc + p.share;
          if(finalX >= acc && finalX <= next){
            return p;
          }
          acc = next;
        }
        return shares[shares.length - 1] || null;
      }

      async function pushHistoryEntry(entry){
        const snap = await db.ref(`${roomPath}/arrowHistory`).once("value");
        const arr = Array.isArray(snap.val())
          ? snap.val()
          : snap.val() && typeof snap.val() === "object"
            ? Object.values(snap.val())
            : [];
        const next = [...arr, entry].slice(-12);
        await db.ref(`${roomPath}/arrowHistory`).set(next);
      }

      async function resolveRound(){
        const snap = await db.ref(roomPath).once("value");
        const data = snap.val() || {};
        const pl = data.players ? Object.values(data.players) : [];

        if(pl.length < 2){
          await db.ref(roomPath).update({
            status:"waiting",
            timer: ROUND_SECONDS,
            phaseText:"waiting",
            winner:null
          });
          resolveLockRef.current = false;
          return;
        }

        const board = arenaRef.current?.getBoundingClientRect();
        const arenaSize = Math.max(260, Math.min(board?.width || 320, 380));
        const margin = 18;
        const usable = arenaSize - margin * 2;

        let x = margin + Math.random() * usable;
        let y = margin + Math.random() * usable;
        let vx = (Math.random() * 6 + 5) * (Math.random() < 0.5 ? -1 : 1);
        let vy = (Math.random() * 5 + 4) * (Math.random() < 0.5 ? -1 : 1);
        let angle = Math.random() * 360;

        setArrow({
          active:true,
          x,y,vx,vy,angle
        });

        await db.ref(roomPath).update({
          status:"spinning",
          phaseText:"spinning"
        });

        let started = performance.now();
        let duration = 10000 + Math.random() * 1300;
        const drag = 0.997;
        const bounce = 0.93;
        const gravity = 0.01;

        if(physRef.current) cancelAnimationFrame(physRef.current);

        const step = (now) => {
          const elapsed = now - started;

          vx *= drag;
          vy *= drag;
          vy += gravity * 0.2;

          x += vx;
          y += vy;
          angle += 20 + Math.random() * 4;

          const min = margin;
          const max = margin + usable;

          if(x <= min){
            x = min;
            vx = Math.abs(vx) * bounce;
          }
          if(x >= max){
            x = max;
            vx = -Math.abs(vx) * bounce;
          }
          if(y <= min){
            y = min;
            vy = Math.abs(vy) * bounce;
          }
          if(y >= max){
            y = max;
            vy = -Math.abs(vy) * bounce;
          }

          const speed = Math.sqrt(vx*vx + vy*vy);
          setArrow({active:true, x, y, vx, vy, angle});

          if(elapsed < duration && speed > 0.28){
            physRef.current = requestAnimationFrame(step);
          }else{
            const normalizedX = Math.max(0, Math.min(1, (x - min) / usable));
            const winner = computeWinnerByX(normalizedX) || weightedPick(pl);
            setArrow(a => ({...a, active:false}));

            setTimeout(async () => {
              const latestSnap = await db.ref(roomPath).once("value");
              const latest = latestSnap.val() || {};
              const latestPlayers = latest.players ? Object.values(latest.players) : pl;
              const latestBank = latestPlayers.reduce((s,p)=>s + Number(p.amount || 0), 0);
              const latestFee = getCommission(latestBank);
              const latestPayout = getPayout(latestBank);

              const finalWinner = winner || null;

              await db.ref(roomPath).update({
                status:"finished",
                timer:0,
                phaseText:"finished",
                winner: finalWinner ? {
                  nickname: finalWinner.nickname,
                  nicknameKey: finalWinner.nicknameKey,
                  amount: finalWinner.amount
                } : null,
                lastGame:{
                  at: Date.now(),
                  roomId: selectedRoom,
                  bank: latestBank,
                  payout: latestPayout,
                  fee: latestFee,
                  winnerName: finalWinner ? finalWinner.nickname : null,
                  winnerKey: finalWinner ? finalWinner.nicknameKey : null,
                  winnerAmount: finalWinner ? finalWinner.amount : null
                }
              });

              if(finalWinner){
                const winnerStatsRef = db.ref(`stats/${finalWinner.nicknameKey}`);
                await winnerStatsRef.transaction((cur) => {
                  const d = cur || { betsCount:0, wins:0, totalBet:0, refs:0 };
                  d.wins = Number(d.wins || 0) + 1;
                  d.lastWinAt = Date.now();
                  return d;
                });
              }

              await pushHistoryEntry({
                at: Date.now(),
                roomId: selectedRoom,
                winnerName: finalWinner ? finalWinner.nickname : null,
                winnerKey: finalWinner ? finalWinner.nicknameKey : null,
                bank: latestBank,
                fee: latestFee,
                payout: latestPayout
              });

              resolveLockRef.current = false;

              setTimeout(async () => {
                const cleanPlayers = {};
                await db.ref(roomPath).update({
                  status:"waiting",
                  timer: ROUND_SECONDS,
                  phaseText:"waiting",
                  winner:null,
                  timerOwner: clientId,
                  players: cleanPlayers
                });
              }, 8000);
            }, 220);
          }
        };

        physRef.current = requestAnimationFrame(step);
      }

                  placeholder={`${langText("room")} / room_1`}
                  maxLength={20}
                />
                <button className="btn-main rounded-[18px] px-4 py-3 font-extrabold" onClick={openRoom}>
                  {langText("openRoom")}
                </button>
              </div>

              <div className="mt-3 flex items-center justify-between gap-2">
                <div className="text-[11px] muted leading-5">
                  {langText("testMode")}<br />
                  {langText("roomId")}: {selectedRoom}
                </div>
                <div className="badge good">{roomReady ? "RTDB ready" : "Connecting"}</div>
              </div>
            </div>
          </div>
        );
      }

      function renderIdentityCard(){
        return (
          <div className="glass rounded-[28px] p-4 mb-4">
            <div className="flex items-center justify-between">
              <div>
                <div className="section-title">{langText("profileInfo")}</div>
                <div className="mt-1 text-xl font-black">{nickname || "Guest"}</div>
              </div>
              <div className="badge blue">
                {shortNick(nickname || "guest")}
              </div>
            </div>

            <div className="mt-4 grid grid-cols-2 gap-2">
              <input
                className="input"
                value={draftNick}
                onChange={(e)=>setDraftNick(e.target.value)}
                placeholder={langText("nickHint")}
                maxLength={18}
              />
              <button className="btn-main rounded-[18px] px-4 py-3 font-extrabold" onClick={async () => {
                const ok = await useNicknameNow();
                if(ok) setNotice(lang === "ru" ? "Ник обновлён" : "Nickname updated");
              }}>
                {langText("continue")}
              </button>
            </div>

            <div className="mt-3 grid grid-cols-2 gap-2">
              <div className="grid-card">
                <div className="text-[11px] uppercase tracking-[0.18em] muted font-extrabold">{langText("roomId")}</div>
                <div className="mt-1 font-black">{selectedRoom}</div>
              </div>
              <div className="grid-card">
                <div className="text-[11px] uppercase tracking-[0.18em] muted font-extrabold">Test</div>
                <div className="mt-1 font-black">Same phone</div>
              </div>
            </div>

            <div className="mt-3 text-[11px] muted leading-5">
              {langText("testFlowText")}
            </div>
          </div>
        );
      }

      function renderGameControls(){
        return (
          <div className="glass rounded-[28px] p-4 mb-4">
            <div className="grid grid-cols-2 gap-3">
              <div>
                <div className="text-[11px] uppercase tracking-[0.18em] muted font-extrabold">{langText("bet")}</div>
                <input
                  className="input mt-2"
                  type="number"
                  min="0.1"
                  step="0.1"
                  value={betAmount}
                  onChange={(e)=>setBetAmount(Number(e.target.value))}
                />
              </div>

              <div className="flex flex-col justify-end gap-2">
                <button className="btn-main rounded-[18px] px-4 py-3 font-extrabold" onClick={joinOrUpdateBet}>
                  {langText("join")}
                </button>
                <div className="text-[11px] muted leading-5">
                  One nickname = one player slot.
                </div>
              </div>
            </div>

            <div className="mt-3 grid grid-cols-3 gap-2">
              <button className="btn-green rounded-[18px] px-4 py-3 font-extrabold" onClick={startRound}>
                {langText("start")}
              </button>
              <button className="btn-dark rounded-[18px] px-4 py-3 font-extrabold" onClick={resetRoom}>
                {langText("reset")}
              </button>
              <button className="btn-dark rounded-[18px] px-4 py-3 font-extrabold" onClick={addQuickDemoPlayer}>
                Demo +
              </button>
            </div>
          </div>
        );
      }

      function renderArena(){
        return (
          <div className="glass rounded-[28px] p-4 mb-4">
            <div className="flex items-center justify-between gap-3 mb-3">
              <div>
                <div className="text-[11px] uppercase tracking-[0.18em] muted font-extrabold">{langText("room")}</div>
                <div className="text-lg font-black">{selectedRoom}</div>
              </div>
              <div className={`badge ${room.status === "spinning" ? "warn" : room.status === "finished" ? "good" : "blue"}`}>
                {room.status}
              </div>
            </div>

            <div className="arena-shell" ref={arenaRef}>
              <div className="arena-inner">
                {shares.map((p, idx) => {
                  const left = shares.slice(0, idx).reduce((s, x) => s + x.share * 100, 0);
                  const width = Math.max(0.05, p.share) * 100;
                  const highlight = winnerPlayer && winnerPlayer.nicknameKey === p.nicknameKey;
                  return (
                    <div
                      key={`${p.nicknameKey}-${idx}`}
                      className="player-zone"
                      style={{
                        left: `${left}%`,
                        width: `${width}%`,
                        background: p.color || seededColor(p.nicknameKey || p.nickname || String(idx)),
                        boxShadow: highlight ? "inset 0 0 0 2px rgba(255,255,255,.20), inset 0 0 30px rgba(255,255,255,.08)" : "none"
                      }}
                    >
                      <div className="zone-label">
                        <div className="avatar-ring">
                          <div className="avatar">
                            <img src={p.avatar || randomAvatar(p.nicknameKey || p.nickname || String(idx))} alt="" />
                          </div>
                        </div>
                        <div className="zone-title">{shortNick(p.nickname || p.nicknameKey || "player")}</div>
                        <div className="zone-sub">
                          {formatTON(p.amount)} TON · {Math.max(1, Math.round((Number(p.share || 0) * 100)))}%
                        </div>
                      </div>
                    </div>
                  );
                })}

                {roomPlayers.length === 0 ? (
                  <div className="absolute inset-0 flex items-center justify-center">
                    <div className="text-center">
                      <div className="text-lg font-black">{langText("noPlayers")}</div>
                      <div className="text-sm muted mt-2">{langText("room")}: {selectedRoom}</div>
                    </div>
                  </div>
                ) : null}

                <div className="pointer-line">
                  {langText("commission")}: 10%
                </div>

                <div className="arrow-wrap">
                  {arrow.active ? (
                    <div
                      style={{
                        position:"absolute",
                        left: `${arrow.x}px`,
                        top: `${arrow.y}px`,
                        transform: `translate(-50%, -50%) rotate(${arrow.angle}deg)`,
                        transition:"none"
                      }}
                    >
                      <div className="arrow-core">
                        <div className="arrow-head"></div>
                      </div>
                    </div>
                  ) : null}
                </div>
              </div>
            </div>

            <div className="mt-3 grid grid-cols-3 gap-2">
              <div className="mini-stat">
                <div className="mini-label">{langText("bank")}</div>
                <div className="mini-value">{formatTON(totalBank)} TON</div>
                <div className="mini-hint">{langText("payout")}: {formatTON(payout)} TON</div>
              </div>
              <div className="mini-stat">
                <div className="mini-label">{langText("timer")}</div>
                <div className="mini-value">{room.timer}s</div>
                <div className="mini-hint">{room.status === "finished" ? langText("roundFinished") : room.phaseText || room.status}</div>
              </div>
              <div className="mini-stat">
                <div className="mini-label">{langText("winner")}</div>
                <div className="mini-value">{winnerPlayer ? shortNick(winnerPlayer.nickname) : "—"}</div>
                <div className="mini-hint">{room.winner ? `${formatTON(room.winner.amount)} TON` : langText("noLast")}</div>
              </div>
            </div>
          </div>
        );
      }

      function renderPlayers(){
        return (
          <div className="glass rounded-[28px] p-4 mb-4">
            <div className="flex items-center justify-between">
              <div>
                <div className="section-title">{langText("players")}</div>
                <div className="text-lg font-black">{roomPlayers.length}</div>
              </div>
              <div className="chip">
                <span className="text-[11px] muted">{langText("bank")}</span>
                <span className="font-black">{formatTON(totalBank)} TON</span>
              </div>
            </div>

            <div className="mt-4 max-h-[250px] overflow-auto thin-scroll pr-1">
              {roomPlayers.length ? roomPlayers.map((p, idx) => (
                <div key={`${p.nicknameKey}-${idx}`} className="flex items-center justify-between gap-3 py-3 border-b border-white/8 last:border-b-0">
                  <div className="flex items-center gap-3 min-w-0">
                    <div className="w-11 h-11 rounded-full overflow-hidden border border-white/10" style={{background:p.color || seededColor(p.nicknameKey || p.nickname || String(idx))}}>
                      <img src={p.avatar || randomAvatar(p.nicknameKey || p.nickname || String(idx))} alt="" className="w-full h-full object-cover" />
                    </div>
                    <div className="min-w-0">
                      <div className="font-extrabold truncate">
                        {p.nickname}
                        {winnerPlayer && winnerPlayer.nicknameKey === p.nicknameKey ? <span className="ml-2 text-[10px] text-emerald-400 uppercase tracking-[0.18em]">winner</span> : null}
                      </div>
                      <div className="text-[11px] muted truncate">
                        {langText("playerZone")} · {Math.max(1, Math.round(Number(p.share || 0) * 100))}%
                      </div>
                    </div>
                  </div>
                  <div className="text-right shrink-0">
                    <div className="font-black text-blue-300">{formatTON(p.amount)} TON</div>
                    <div className="text-[10px] muted">{p.joinedAt ? new Date(p.joinedAt).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}) : ""}</div>
                  </div>
                </div>
              )) : (
                <div className="py-10 text-center muted">{langText("noPlayers")}</div>
              )}
            </div>
          </div>
        );
      }

      function renderLastGame(){
        const g = room.lastGame;
        return (
          <div className="glass rounded-[28px] p-4 mb-4">
            <div className="flex items-center justify-between">
              <div>
                <div className="section-title">Last game</div>
                <div className="text-lg font-black">History</div>
              </div>
              <div className="text-[11px] muted">Firebase RTDB</div>
            </div>

            <div className="mt-4 rounded-[20px] border border-white/10 bg-black/25 p-4">
              {g ? (
                <>
                  <div className="flex items-center justify-between gap-3">
                    <div className="min-w-0">
                      <div className="font-black truncate">{g.winnerName || "—"}</div>
                      <div className="text-[11px] muted truncate">{g.winnerKey || ""}</div>
                    </div>
                    <div className="font-black text-blue-300 shrink-0">{formatTON(g.payout || 0)} TON</div>
                  </div>
                  <div className="mt-2 text-[11px] muted">
                    Room: {g.roomId || selectedRoom} · {g.at ? new Date(g.at).toLocaleString() : ""}
                  </div>
                  <div className="mt-2 text-[11px] muted">
                    {langText("feeNote")}: {formatTON(g.fee || 0)} TON
                  </div>
                </>
              ) : (
                <div className="text-sm muted">{langText("noLast")}</div>
              )}
            </div>

            <div className="mt-4">
              <div className="section-title">Arrow history</div>
              <div className="mt-3 max-h-[160px] overflow-auto thin-scroll pr-1">
                {history.length ? history.slice().reverse().map((h, i) => (
                  <div key={i} className="flex items-center justify-between gap-3 py-2 border-b border-white/8 last:border-b-0">
                    <div className="min-w-0">
                      <div className="font-bold truncate">{h.winnerName || "—"}</div>
                      <div className="text-[11px] muted truncate">{h.roomId || selectedRoom}</div>
                    </div>
                    <div className="text-right shrink-0">
                      <div className="font-black text-blue-300">{formatTON(h.payout || 0)} TON</div>
                      <div className="text-[10px] muted">{h.at ? new Date(h.at).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}) : ""}</div>
                    </div>
                  </div>
                )) : (
                  <div className="text-sm muted">{langText("noLast")}</div>
                )}
              </div>
            </div>

            <div className="mt-4 text-[11px] muted leading-6">
              Сейчас это тестовая версия. Потом сюда можно вернуть TonConnect, реальные транзакции и депозитный escrow.
            </div>
          </div>
        );
      }

      function renderGamesTab(){
        return (
          <>
            {renderHero()}
            {renderIdentityCard()}
            {renderGameControls()}
            {renderArena()}
            {renderPlayers()}
            {renderLastGame()}
          </>
        );
      }

      function renderRefsTab(){
        return (
          <div className="glass rounded-[28px] p-4 mb-4">
            <div className="flex items-center justify-between">
              <div>
                <div className="badge blue">Referrals</div>
                <div className="mt-3 text-2xl font-black">{langText("referralTitle")}</div>
              </div>
              <div className="w-12 h-12 rounded-2xl bg-white/7 border border-white/10 flex items-center justify-center">
                <span>↗</span>
              </div>
            </div>

            <div className="mt-4 text-[13px] leading-6 muted">
              {langText("referralDesc")}
            </div>

            <div className="mt-4 grid gap-3">
              <div className="grid-card">
                <div className="text-[11px] uppercase tracking-[0.18em] muted font-extrabold">{langText("referralLink")}</div>
                <div className="mt-2 break-all text-[13px] font-bold">{roomLink}</div>
                <button className="mt-3 btn-main rounded-[18px] px-4 py-3 font-extrabold" onClick={async () => {
                  try{
                    await navigator.clipboard.writeText(roomLink);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 1400);
                  }catch{
                    alert(roomLink);
                  }
                }}>
                  {copied ? langText("copied") : langText("copy")}
                </button>
              </div>

              <div className="grid-card">
                <div className="text-[11px] uppercase tracking-[0.18em] muted font-extrabold">{langText("howItWorks")}</div>
                <div className="mt-2 text-[13px] leading-6 muted">
                  1) Игрок переходит по ссылке.<br/>
                  2) Вводит ник и входит в комнату.<br/>
                  3) Делает ставку.<br/>
                  4) Ты получаешь реферальный бонус по правилам системы.
                </div>
              </div>

              <div className="grid-card">
                <div className="text-[11px] uppercase tracking-[0.18em] muted font-extrabold">{langText("commission")}</div>
                <div className="mt-2 text-[13px] leading-6 muted">
                  Платформа удерживает 10% от банка. Это отдельная комиссия матча.
                </div>
              </div>
            </div>
          </div>
        );
      }

      function renderProfileTab(){
        return (
          <div className="glass rounded-[28px] p-4 mb-4">
            <div className="flex items-center justify-between">
              <div>
                <div className="badge blue">{langText("profileInfo")}</div>
                <div className="mt-3 text-2xl font-black">{nickname || "Guest"}</div>
                <div className="mt-1 text-sm muted">{langText("testMode")}</div>
              </div>
              <div className="w-14 h-14 rounded-[20px] overflow-hidden border border-white/10">
                <img src={randomAvatar(nickKey(nickname || "guest"))} alt="" className="w-full h-full object-cover" />
              </div>
            </div>

            <div className="mt-4 grid grid-cols-2 gap-2">
              <button
                className={`rounded-[18px] px-4 py-3 font-extrabold ${lang === "ru" ? "btn-main" : "btn-dark"}`}
                onClick={() => setLang("ru")}
              >
                Русский
              </button>
              <button
                className={`rounded-[18px] px-4 py-3 font-extrabold ${lang === "en" ? "btn-main" : "btn-dark"}`}
                onClick={() => setLang("en")}
              >
                English
              </button>
            </div>

            <div className="mt-4 grid grid-cols-2 gap-2">
              <div className="mini-stat">
                <div className="mini-label">{langText("betsCount")}</div>
                <div className="mini-value">{myStats.betsCount}</div>
                <div className="mini-hint">{langText("stats")}</div>
              </div>
              <div className="mini-stat">
                <div className="mini-label">{langText("wins")}</div>
                <div className="mini-value">{myStats.wins}</div>
                <div className="mini-hint">{langText("stats")}</div>
              </div>
              <div className="mini-stat">
                <div className="mini-label">{langText("totalBet")}</div>
                <div className="mini-value">{formatTON(myStats.totalBet)} TON</div>
                <div className="mini-hint">{langText("stats")}</div>
              </div>
              <div className="mini-stat">
                <div className="mini-label">{langText("rooms")}</div>
                <div className="mini-value">1</div>
                <div className="mini-hint">{selectedRoom}</div>
              </div>
            </div>

            <div className="mt-4 grid gap-2">
              <button className="btn-dark rounded-[18px] px-4 py-3 font-extrabold" onClick={() => setSupportOpen(true)}>
                {langText("support")}
              </button>
              <button className="btn-dark rounded-[18px] px-4 py-3 font-extrabold" onClick={() => setGateOpen(true)}>
                Change nickname
              </button>
            </div>

            <div className="mt-4 text-[11px] muted leading-6">
              Nickname: {nickname || "—"}<br/>
              Room: {selectedRoom}<br/>
              Referral code: {makeReferralCode(nickname || "guest")}
            </div>
          </div>
        );
      }

      function renderBottomNav(){
        return (
          <div className="nav-inner">
            <button className={`nav-btn ${tab==="games" ? "active" : ""}`} onClick={()=>setTab("games")}>
              <span className="nav-ic"></span>
              <span>{langText("games")}</span>
            </button>
            <button className={`nav-btn ${tab==="refs" ? "active" : ""}`} onClick={()=>setTab("refs")}>
              <span className="nav-ic"></span>
              <span>{langText("refs")}</span>
            </button>
            <button className={`nav-btn ${tab==="profile" ? "active" : ""}`} onClick={()=>setTab("profile")}>
              <span className="nav-ic"></span>
              <span>{langText("profile")}</span>
            </button>
          </div>
        );
      }

      function renderSupportSheet(){
        if(!supportOpen) return null;
        return (
          <div className="support-mask">
            <div className="support-sheet">
              <div className="flex items-center justify-between gap-3">
                <div>
                  <div className="badge warn">{langText("supportTitle")}</div>
                  <div className="mt-3 text-2xl font-black">{langText("supportSoon")}</div>
                </div>
                <button className="btn-dark rounded-[14px] px-3 py-2 font-bold" onClick={() => setSupportOpen(false)}>
                  {langText("back")}
                </button>
              </div>

              <div className="mt-4 grid-card">
                <div className="text-[13px] leading-6 muted">
                  {langText("supportText")}
                </div>
              </div>

              <div className="mt-3 grid-card">
                <div className="text-[11px] uppercase tracking-[0.18em] muted font-extrabold">Note</div>
                <div className="mt-2 text-[13px] leading-6 muted">
                  Здесь позже появится чат поддержки, FAQ и кнопка связи.
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <>
          {renderGate()}
          {renderSupportSheet()}

          <div className="app">
            {renderTopBar()}
            {tab === "games" ? renderGamesTab() : null}
            {tab === "refs" ? renderRefsTab() : null}
            {tab === "profile" ? renderProfileTab() : null}

            {notice ? (
              <div className="mb-4 text-center text-[11px] muted">{notice}</div>
            ) : null}
          </div>

          <div className="nav-bar">
            <div id="nav-anchor">{renderBottomNav()}</div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
