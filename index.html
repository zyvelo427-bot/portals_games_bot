<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Arena</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #000);
  color:white;
  font-family:sans-serif;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius:16px;
  padding:16px;
  border:1px solid rgba(255,255,255,0.08);
}

.player {
  position:absolute;
  width:44px;
  height:44px;
  border-radius:50%;
  background:#3b82f6;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  transition: all 0.8s ease;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const firebaseConfig = {
  apiKey: "AIzaSyCsgo_VhjPWLyUtZCE0jCzqCmQa-du0qwI",
  authDomain: "portals-c5000.firebaseapp.com",
  databaseURL: "https://portals-c5000-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "portals-c5000",
  storageBucket: "portals-c5000.firebasestorage.app",
  messagingSenderId: "24003070752",
  appId: "1:24003070752:web:0b83600a20383640e5a545"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const { useState, useEffect } = React;

function App(){

  const [wallet,setWallet] = useState(null);
  const [betAmount,setBetAmount] = useState(1);
  const [players,setPlayers] = useState([]);
  const [bank,setBank] = useState(0);
  const [timer,setTimer] = useState(0);

  // Ton Connect
  useEffect(()=>{

    const ton = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: "https://your-site.com/tonconnect-manifest.json",
      buttonRootId: "ton-connect"
    });

    ton.onStatusChange(wallet=>{
      if(wallet){
        setWallet(wallet.account.address);
      }
    });

  },[]);

  // Firebase sync
  useEffect(()=>{

    firebase.auth().signInAnonymously();

    db.ref("game").on("value", snap=>{
      const data = snap.val() || {};
      setPlayers(data.players ? Object.values(data.players) : []);
      setBank(data.bank || 0);
      setTimer(data.timer || 0);
    });

  },[]);

  // Join game (ОДИН игрок = ОДНА запись)
  const joinGame = ()=>{

    if(!wallet) return;

    const ref = db.ref("game/players");

    // проверка: уже есть ставка?
    ref.orderByChild("wallet").equalTo(wallet).once("value", snap=>{

      if(snap.exists()){
        alert("Ты уже в игре");
        return;
      }

      ref.push({
        name: wallet.slice(0,6),
        wallet: wallet,
        amount: betAmount
      });

      db.ref("game/bank").transaction(v=>(v||0)+betAmount);

    });

  };

  // Start
  const startGame = ()=>{

    if(players.length < 2) return;

    let t = 20;

    const interval = setInterval(()=>{

      t--;
      db.ref("game").update({timer:t});

      if(t<=0){
        clearInterval(interval);
        pickWinner();
      }

    },1000);

  };

  const pickWinner = ()=>{

    let total = players.reduce((a,p)=>a+p.amount,0);
    let rand = Math.random()*total;

    let sum = 0;

    for(let p of players){
      sum += p.amount;
      if(rand <= sum){
        db.ref("game").update({winner:p.name});
        alert("Winner: " + p.name);
        break;
      }
    }
  };

  return (
    <div className="max-w-md mx-auto p-4">

      <div className="card text-center">
        <h1 className="text-xl font-bold text-blue-400">TON Arena</h1>
        <p className="text-xs mt-1">Wallet: {wallet || "Not connected"}</p>
      </div>

      <div id="ton-connect" className="mt-3"></div>

      <div className="card mt-4 flex justify-between text-sm">
        <div>Bank: {bank}</div>
        <div>Players: {players.length}</div>
        <div>Timer: {timer}</div>
      </div>

      <div className="card mt-4">
        <p className="text-sm mb-2">Bet amount</p>

        <input
          type="number"
          value={betAmount}
          onChange={e=>setBetAmount(Number(e.target.value))}
          className="w-full p-2 rounded bg-black border border-white/20"
        />

        <button onClick={joinGame} className="mt-3 w-full bg-blue-600 p-2 rounded">
          Join Game
        </button>
      </div>

      <button onClick={startGame} className="w-full mt-4 bg-green-600 p-2 rounded">
        Start Game
      </button>

      <div className="card mt-6 h-64 relative overflow-hidden">

        {players.map((p,i)=>{

          const angle = (i / players.length) * Math.PI * 2;
          const radius = 80;

          const x = 120 + Math.cos(angle) * radius;
          const y = 100 + Math.sin(angle) * radius;

          return (
            <div
              key={i}
              className="player"
              style={{left:x, top:y}}
            >
              {p.name}
            </div>
          );
        })}

      </div>

      <div className="card mt-4">
        {players.map((p,i)=>(
          <div key={i} className="flex justify-between text-xs border-b border-white/10 py-1">
            <span>{p.name}</span>
            <span>{p.amount} TON</span>
          </div>
        ))}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
