<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Arena</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://tg.dev/js/telegram-web-app.js"></script>
    
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            font-family: -apple-system, system-ui, sans-serif; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-blur { 
            background: rgba(18, 18, 20, 0.9); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
        }
        .arena-card { 
            background: linear-gradient(145deg, #161618, #0a0a0b); 
            border: 1px solid rgba(255,255,255,0.08);
        }
        .btn-bet { 
            background: #1c1c1e; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.1s ease;
        }
        .btn-bet:active { 
            transform: scale(0.95); 
            background: #2563eb; 
        }
        /* Убираем скроллбар */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [balance, setBalance] = useState(100.00);
            const [bank, setBank] = useState(0.00);
            const [username, setUsername] = useState('Gamer');
            const [online, setOnline] = useState(124);
            const [tab, setTab] = useState('arena');

            // Инициализация Telegram
            useEffect(() => {
                if (window.Telegram?.WebApp) {
                    const tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    if (tg.initDataUnsafe?.user) {
                        setUsername(tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name);
                    }
                }
                
                // Имитация живого банка для фана
                const interval = setInterval(() => {
                    setBank(prev => prev + Math.random() * 0.1);
                }, 3000);
                return () => clearInterval(interval);
            }, []);

            const placeBet = (amount) => {
                if (balance < amount) return;
                
                // Виброотклик Telegram
                window.Telegram?.WebApp?.HapticFeedback?.impactOccurred('medium');
                
                setBalance(prev => prev - amount);
                setBank(prev => prev + amount);
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto">
                    {/* Header */}
                    <div className="p-6 pt-10 flex justify-between items-center">
                        <div>
                            <h1 className="text-xl font-black italic tracking-tighter text-blue-500">ARENA.ONE</h1>
                            <div className="flex items-center gap-1.5 mt-1">
                                <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                                <span className="text-[10px] font-bold text-gray-500 uppercase tracking-tighter">{online} PLAYERS</span>
                            </div>
                        </div>
                        <div className="bg-[#1c1c1e] px-4 py-2 rounded-2xl border border-white/5 flex items-center gap-2">
                            <span className="text-sm font-black">{balance.toFixed(2)} <span className="text-blue-500">TON</span></span>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 px-6 overflow-y-auto pb-32">
                        {tab === 'arena' ? (
                            <div className="space-y-6">
                                <div className="arena-card rounded-[40px] p-8 text-center shadow-2xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">Current Bank</p>
                                        <h2 className="text-4xl font-black italic mb-8">{bank.toFixed(2)} ▽</h2>
                                        
                                        <div className="w-40 h-40 mx-auto rounded-full bg-gradient-to-tr from-blue-600 to-purple-600 p-1 mb-4 shadow-[0_0_30px_rgba(37,99,235,0.3)]">
                                            <div className="w-full h-full rounded-full bg-black overflow-hidden flex items-center justify-center">
                                                <img 
                                                    src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${username}`} 
                                                    className="w-full h-full scale-110"
                                                />
                                            </div>
                                        </div>
                                        <p className="font-black text-gray-400">@{username}</p>
                                    </div>
                                    <div className="absolute top-0 right-0 p-4">
                                        <div className="text-[10px] font-black text-blue-500 border border-blue-500/30 px-2 py-1 rounded-lg uppercase">Live</div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-4 gap-3">
                                    {[1, 5, 10, 25].map(val => (
                                        <button 
                                            key={val}
                                            onClick={() => placeBet(val)}
                                            className="btn-bet h-16 rounded-2xl flex flex-col items-center justify-center"
                                        >
                                            <span className="text-sm font-black">{val}</span>
                                            <span className="text-[8px] font-bold text-gray-500">TON</span>
                                        </button>
                                    ))}
                                </div>

                                <div className="bg-[#111] p-4 rounded-3xl border border-white/5 flex items-center justify-between">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center">
                                            <span className="text-blue-500 font-bold">#1</span>
                                        </div>
                                        <div>
                                            <p className="text-[10px] font-black text-gray-500 uppercase">Top Winner</p>
                                            <p className="text-xs font-bold">@whale_ton <span className="text-blue-500">+1,420 ▽</span></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="h-64 flex flex-col items-center justify-center opacity-20">
                                <p className="font-black uppercase tracking-widest text-xs">Coming Soon</p>
                            </div>
                        )}
                    </div>

                    {/* Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 p-6 z-50">
                        <div className="nav-blur h-20 rounded-[35px] flex items-center justify-around px-4 border border-white/5 shadow-2xl">
                            <button onClick={() => setTab('arena')} className={`flex flex-col items-center gap-1 ${tab === 'arena' ? 'text-blue-500' : 'text-gray-600'}`}>
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect><circle cx="15.5" cy="15.5" r=".5" fill="currentColor"></circle><circle cx="18.5" cy="12.5" r=".5" fill="currentColor"></circle></svg>
                                <span className="text-[8px] font-black uppercase">Arena</span>
                            </button>
                            <button onClick={() => setTab('profile')} className={`flex flex-col items-center gap-1 ${tab === 'profile' ? 'text-blue-500' : 'text-gray-600'}`}>
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                <span className="text-[8px] font-black uppercase">Profile</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
