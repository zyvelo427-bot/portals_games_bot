<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Arena</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<style>
body {
  background:#000;
  color:#fff;
  margin:0;
  font-family:sans-serif;
}

.glass {
  background: linear-gradient(145deg,#1a1a1c,#0a0a0b);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
}

.player {
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:bold;
  background:#2563eb;
  transition: all 0.5s ease;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const firebaseConfig = {
  apiKey: "AIzaSyCsgo_VhjPWLyUtZCE0jCzqCmQa-du0qwI",
  authDomain: "portals-c5000.firebaseapp.com",
  databaseURL: "https://portals-c5000-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "portals-c5000",
  storageBucket: "portals-c5000.firebasestorage.app",
  messagingSenderId: "24003070752",
  appId: "1:24003070752:web:0b83600a20383640e5a545"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const { useState, useEffect } = React;

function App(){

  const [players,setPlayers] = useState([]);
  const [bank,setBank] = useState(0);
  const [timer,setTimer] = useState(0);
  const [username,setUsername] = useState("Player");

  useEffect(()=>{

    firebase.auth().signInAnonymously();

    const ref = db.ref("game");

    ref.on("value", snap=>{
      const data = snap.val() || {};
      setPlayers(data.players ? Object.values(data.players) : []);
      setBank(data.bank || 0);
      setTimer(data.timer || 0);
    });

  },[]);

  const bet = (amount)=>{

    const ref = db.ref("game");

    ref.child("players").push({
      name: username,
      amount: amount
    });

    ref.child("bank").transaction(v=>(v||0)+amount);
  };

  const startGame = ()=>{
    if(players.length < 2) return;

    let t = 20;

    const interval = setInterval(()=>{
      t--;
      db.ref("game").update({timer:t});

      if(t<=0){
        clearInterval(interval);
        pickWinner();
      }
    },1000);
  };

  const pickWinner = ()=>{

    let total = players.reduce((a,p)=>a+p.amount,0);
    let rand = Math.random()*total;

    let sum = 0;

    for(let p of players){
      sum += p.amount;
      if(rand <= sum){
        db.ref("game").update({winner:p.name});
        alert("🏆 Winner: " + p.name);
        break;
      }
    }
  };

  return (
    <div className="p-6 max-w-md mx-auto">

      <div className="glass p-6 text-center">
        <h1 className="text-2xl font-bold text-blue-500">TON Arena</h1>

        <p className="text-sm mt-2">Банк: {bank}</p>
        <p className="text-sm">Таймер: {timer}</p>
        <p className="text-sm">Игроков: {players.length}</p>
      </div>

      <div className="flex gap-2 mt-4">
        {[1,5,10,25].map(v=>(
          <button key={v} onClick={()=>bet(v)} className="glass px-4 py-2 flex-1">
            {v} TON
          </button>
        ))}
      </div>

      <button onClick={startGame} className="glass w-full mt-4 py-3">
        Start Game
      </button>

      <div className="glass mt-6 h-64 relative overflow-hidden">

        {players.map((p,i)=>(
          <div
            key={i}
            className="player"
            style={{
              left: Math.random()*80+"%",
              top: Math.random()*80+"%"
            }}
          >
            {p.name}
          </div>
        ))}

      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
