<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Arena v2</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;margin:0}
.bottom-nav{position:fixed;bottom:0;width:100%;display:flex;background:#111}
.bottom-nav button{flex:1;padding:14px;border:none;color:#fff;background:#111}
.active{background:#222}
.arena{width:300px;height:300px;position:relative;margin:auto;background:#111}
.zone{position:absolute}
.ball{width:16px;height:16px;border-radius:50%;background:white;position:absolute}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "portals-c5000.firebaseapp.com",
  databaseURL: "https://portals-c5000-default-rtdb.europe-west1.firebasedatabase.app",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const {useState,useEffect,useRef} = React;

function App(){

const [tab,setTab]=useState("games");
const [nickname,setNickname]=useState(localStorage.getItem("nick")||"");
const [inputNick,setInputNick]=useState("");
const [bet,setBet]=useState(1);
const [players,setPlayers]=useState([]);
const [ball,setBall]=useState({x:150,y:150,vx:4,vy:3,active:false});

useEffect(()=>{
firebase.auth().signInAnonymously();
db.ref("testRoom/players").on("value",snap=>{
let data=snap.val()||{};
setPlayers(Object.values(data));
});
},[]);

const join=()=>{
if(!inputNick)return alert("Введите ник");

db.ref("testRoom/players/"+inputNick).once("value",snap=>{
if(snap.exists()){
alert("Ник занят");
}else{
db.ref("testRoom/players/"+inputNick).set({
name:inputNick,
amount:bet,
color:`hsl(${Math.random()*360},70%,50%)`
});
localStorage.setItem("nick",inputNick);
setNickname(inputNick);
}
});
};

const startGame=()=>{
setBall({...ball,active:true});
};

useEffect(()=>{
if(!ball.active)return;

const interval=setInterval(()=>{
setBall(b=>{
let x=b.x+b.vx;
let y=b.y+b.vy;

if(x<0||x>300){b.vx*=-1}
if(y<0||y>300){b.vy*=-1}

return {...b,x,y};
});
},30);

setTimeout(()=>{
clearInterval(interval);
setBall(b=>({...b,active:false}));

// winner
let total=players.reduce((s,p)=>s+p.amount,0);
let r=Math.random()*total;
let sum=0;
for(let p of players){
sum+=p.amount;
if(r<=sum){
alert("WINNER: "+p.name);
break;
}
}

},10000);

},[ball.active]);

// % zones
let total=players.reduce((s,p)=>s+p.amount,0);
let offset=0;

return(

<div style={{paddingBottom:60}}>

{!nickname ? (
<div style={{padding:20}}>
<h2>Enter Nick</h2>
<input value={inputNick} onChange={e=>setInputNick(e.target.value)} />
<input type="number" value={bet} onChange={e=>setBet(+e.target.value)} />
<button onClick={join}>Join</button>
</div>
):(

<>
{tab==="games" && (
<div>
<h2 style={{textAlign:"center"}}>Arena</h2>

<div className="arena">
{players.map((p,i)=>{
let width=(p.amount/total)*300;
let div=(
<div key={i} className="zone" style={{
left:offset,
top:0,
width:width,
height:300,
background:p.color
}}>
<div style={{position:"absolute",left:"50%",top:"50%"}}>
{p.name}
</div>
</div>
);
offset+=width;
return div;
})}

{ball.active && <div className="ball" style={{left:ball.x,top:ball.y}}></div>}
</div>

<button onClick={startGame}>START</button>
</div>
)}

{tab==="ref" && (
<div style={{padding:20}}>
<h2>Referral</h2>
<p>Приглашай друзей и получай 10%</p>
<input value={"https://tonarena/ref123"} readOnly/>
</div>
)}

{tab==="profile" && (
<div style={{padding:20}}>
<h2>Profile</h2>
<p>Nick: {nickname}</p>
<button onClick={()=>alert("Скоро")}>Support</button>
</div>
)}

</>
)}

<div className="bottom-nav">
<button className={tab==="games"?"active":""} onClick={()=>setTab("games")}>Games</button>
<button className={tab==="ref"?"active":""} onClick={()=>setTab("ref")}>Ref</button>
<button className={tab==="profile"?"active":""} onClick={()=>setTab("profile")}>Profile</button>
</div>

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
